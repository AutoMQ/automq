# AutoMQ DevKit - Default Configuration
# Layer 1: Base settings for local development with MinIO

# KRaft mode
controller.listener.names=CONTROLLER
inter.broker.listener.name=PLAINTEXT
listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT

# S3 storage (MinIO)
elasticstream.enable=true
s3.data.buckets=0@s3://${S3_DATA_BUCKET}?region=${S3_REGION}&endpoint=${S3_ENDPOINT}&pathStyle=${S3_PATH_STYLE}
s3.ops.buckets=1@s3://${S3_OPS_BUCKET}?region=${S3_REGION}&endpoint=${S3_ENDPOINT}&pathStyle=${S3_PATH_STYLE}
s3.wal.path=0@s3://${S3_DATA_BUCKET}?region=${S3_REGION}&endpoint=${S3_ENDPOINT}&pathStyle=${S3_PATH_STYLE}

# Internal topics (single-node defaults)
offsets.topic.replication.factor=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1

# Log
log.dirs=/tmp/kraft-combined-logs
num.partitions=1

# Auto Balancer
metric.reporters=kafka.autobalancer.metricsreporter.AutoBalancerMetricsReporter
