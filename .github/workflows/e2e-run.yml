name: Run E2E tests
on:
  workflow_dispatch:
    inputs:
      runner:
        required: true
        type: string
      suite-id:
        required: true
        type: string
      test-yaml:
        required: false
        type: string
      test-path:
        required: false
        type: string
      public-ssh-key:
        required: false
        type: string
        description: "Public SSH key for debug access on failure"
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
      suite-id:
        required: true
        type: string
      test-yaml:
        required: false
        type: string
      test-path:
        required: false
        type: string
      public-ssh-key:
        required: false
        type: string
    outputs:
      artifact-id:
        description: "Artifact ID of the test results"
        value: ${{ jobs.run_e2e.outputs.artifact-id }}
      success-num:
        description: "Number of successful tests"
        value: ${{ jobs.run_e2e.outputs.success-num }}
      failure-num:
        description: "Number of failed tests"
        value: ${{ jobs.run_e2e.outputs.failure-num }}
      run-time-secs:
        description: "Total run time in seconds"
        value: ${{ jobs.run_e2e.outputs.run-time-secs }}


jobs:
  run_e2e:
    name: "Run E2E tests"
    timeout-minutes: 2880
    runs-on: ${{ inputs.runner }}
    # Map the job outputs to step outputs
    outputs:
      artifact-id: ${{ steps.archive-artifacts.outputs.artifact-id }}
      success-num: ${{ steps.extract-results.outputs.success-num }}
      failure-num: ${{ steps.extract-results.outputs.failure-num }}
      run-time-secs: ${{ steps.extract-results.outputs.run-time-secs }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Clean last running results
        run: |
          rm -rf results
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Run E2E tests
        env:
          E2E_TEST_YAML: ${{ inputs.test-yaml }}
          E2E_TEST_PATH: ${{ inputs.test-path }}
          _DUCKTAPE_OPTIONS: "--deflake 4"
        run: |
          set -euo pipefail
          if [[ -z "${E2E_TEST_YAML}" && -z "${E2E_TEST_PATH}" ]]; then
            echo "::error::Either test-yaml or test-path must be provided"
            exit 1
          fi
          if [[ -n "${E2E_TEST_PATH}" ]]; then
            TC_PATHS="${E2E_TEST_PATH}" ./tests/docker/run_tests.sh
          else
            ESK_TEST_YML="${E2E_TEST_YAML}" ./tests/docker/run_tests.sh
          fi
        shell: bash
      - name: Extract results
        id: extract-results
        run: |
          results_path=""
          if [[ -d "$(pwd)/results" ]]; then
            results_path="$(find "$(pwd)/results" -maxdepth 1 -type d -name '*-*' | sort -r | head -n 1)"
          fi
          report="${results_path}/report.json"
          if [[ -n "${results_path}" && -f "${report}" ]]; then
            echo "success-num=$(jq -r '.num_passed // 0' "${report}")" >> "$GITHUB_OUTPUT"
            echo "failure-num=$(jq -r '.num_failed // 0' "${report}")" >> "$GITHUB_OUTPUT"
            echo "run-time-secs=$(jq -r '.run_time_seconds // 0' "${report}")" >> "$GITHUB_OUTPUT"
          else
            echo "success-num=0" >> "$GITHUB_OUTPUT"
            echo "failure-num=0" >> "$GITHUB_OUTPUT"
            echo "run-time-secs=0" >> "$GITHUB_OUTPUT"
          fi
        if: ${{ always() }}
        shell: bash
      - name: Archive result artifacts
        id: archive-artifacts
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: ${{ inputs.suite-id }}
          retention-days: 3
          compression-level: 1
          path: |
            results/
      - name: show results
        run: |
          echo "success-num=${{ steps.extract-results.outputs.success-num }}"
          echo "failure-num=${{ steps.extract-results.outputs.failure-num }}"
          echo "run-time-secs=${{ steps.extract-results.outputs.run-time-secs }}"
          echo "artifact-id=${{ steps.archive-artifacts.outputs.artifact-id }}"
        if: ${{ always() }}
      - name: Setup SSH access for debugging
        uses: ubicloud/ssh-runner@main
        if: ${{ failure() && inputs.public-ssh-key != '' }}
        with:
          public-ssh-key: ${{ inputs.public-ssh-key }}
          wait-minutes: 60
      - name: Bring down docker containers
        run: ./tests/docker/ducker-ak down
        shell: bash
        if: ${{ always() }}
